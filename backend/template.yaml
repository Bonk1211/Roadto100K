AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  SafeSend v4.1 — Single FastAPI Lambda behind a Function URL.
  No API Gateway. Workers stay separate (verify_alert via SQS, retrain_trigger via EventBridge).

Globals:
  Function:
    Runtime: python3.12
    MemorySize: 512
    Timeout: 10
    Environment:
      Variables:
        RDSHOST: "database-1.cf82a0026hlh.ap-southeast-1.rds.amazonaws.com"
        RDSPORT: "5432"
        RDSDBNAME: "postgres"
        RDSUSER: "postgres"
        RDSPASSWORD: !Ref RdsPassword
        KINESIS_STREAM: !Ref EventsStream
        SNS_TOPIC_ARN: !Ref UserAlertsTopic
        BEDROCK_MODEL_ID: "anthropic.claude-3-haiku-20240307-v1:0"
        BEDROCK_REGION: "ap-southeast-1"
        VERIFY_QUEUE_URL: !Ref VerificationQueue
        VERIFY_MOCK: !Ref VerifyMock
        STREAM_DB_FLUSH_SEC: "0.18"
        OSS_ENDPOINT: ""
        OSS_BUCKET: ""
        OSS_ACCESS_KEY_ID: ""
        OSS_ACCESS_KEY_SECRET: ""
    Architectures:
      - x86_64

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [prod, dev]
  RdsPassword:
    Type: String
    NoEcho: true
    Description: Password for RDS postgres user
  VerifyMock:
    Type: String
    Default: "0"
    AllowedValues: ["0", "1"]
    Description: 1 = deterministic mock streaming agents. 0 = real Bedrock streaming.

Resources:
  # =========================================================================
  # Single API Lambda — FastAPI behind Mangum, exposed via Function URL.
  # CodeUri = lambdas/ so the api handler can import sibling logic modules.
  # =========================================================================
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: safesend-api
      CodeUri: lambdas/
      Handler: api.handler.handler
      Timeout: 30
      MemorySize: 1024
      ReservedConcurrentExecutions: 50
      Layers:
        - !Ref SharedLayer
      Policies:
        - KinesisCrudPolicy:
            StreamName: !Ref EventsStream
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt UserAlertsTopic.TopicName
        - SQSSendMessagePolicy:
            QueueName: !GetAtt VerificationQueue.QueueName
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
        - SSMParameterReadPolicy:
            ParameterName: "safesend/*"
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED
        Cors:
          AllowOrigins:
            - "*"
          AllowMethods:
            - "*"
          AllowHeaders:
            - "Content-Type"
            - "x-api-key"
          MaxAge: 86400

  # =========================================================================
  # Worker — autonomous fraud-verify (SQS-driven, kept separate)
  # =========================================================================
  VerificationDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: safesend-verify-dlq
      MessageRetentionPeriod: 1209600

  VerificationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: safesend-verify-queue
      VisibilityTimeout: 360
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt VerificationDLQ.Arn
        maxReceiveCount: 3

  VerifyAlertFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: safesend-verify-alert
      CodeUri: lambdas/verify_alert/
      Handler: handler.handler
      Timeout: 300
      MemorySize: 1024
      ReservedConcurrentExecutions: 5
      Layers:
        - !Ref SharedLayer
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
        - SQSPollerPolicy:
            QueueName: !GetAtt VerificationQueue.QueueName
      Events:
        VerifyMessage:
          Type: SQS
          Properties:
            Queue: !GetAtt VerificationQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures

  # =========================================================================
  # Shared Lambda Layer
  # =========================================================================
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: safesend-shared
      ContentUri: layer/
      CompatibleRuntimes:
        - python3.12
    Metadata:
      BuildMethod: python3.12

  # =========================================================================
  # Kinesis stream
  # =========================================================================
  EventsStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: safesend-events
      ShardCount: 1
      RetentionPeriodHours: 24
      StreamModeDetails:
        StreamMode: PROVISIONED

  # =========================================================================
  # SNS topic
  # =========================================================================
  UserAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: safesend-user-alerts
      DisplayName: SafeSend

Outputs:
  ApiUrl:
    Description: Public Lambda Function URL — single entrypoint for user-app + agent-dashboard.
    Value: !GetAtt ApiFunctionUrl.FunctionUrl
  ApiFunctionName:
    Value: !Ref ApiFunction
  EventsStreamName:
    Value: !Ref EventsStream
  SnsTopicArn:
    Value: !Ref UserAlertsTopic
  VerificationQueueUrl:
    Value: !Ref VerificationQueue
  VerificationQueueArn:
    Value: !GetAtt VerificationQueue.Arn

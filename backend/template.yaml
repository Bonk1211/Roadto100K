AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  SafeSend — Multi-layer scam prevention system for Touch 'n Go FinHack.
  AWS SAM template for Lambda functions, API Gateway, PostgreSQL (RDS), Kinesis, SNS.

Globals:
  Function:
    Runtime: python3.12
    MemorySize: 512
    Timeout: 10
    Environment:
      Variables:
        RDSHOST: "database-1.cf82a0026hlh.ap-southeast-1.rds.amazonaws.com"
        RDSPORT: "5432"
        RDSDBNAME: "postgres"
        RDSUSER: "postgres"
        RDSPASSWORD: !Ref RdsPassword
        KINESIS_STREAM: !Ref EventsStream
        SNS_TOPIC_ARN: !Ref UserAlertsTopic
        BEDROCK_MODEL_ID: "anthropic.claude-3-haiku-20240307-v1:0"
        BEDROCK_REGION: "ap-southeast-1"
    Architectures:
      - x86_64

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [prod, dev]
  RdsPassword:
    Type: String
    NoEcho: true
    Description: Password for RDS postgres user

Resources:
  # =========================================================================
  # API Gateway (HTTP API)
  # =========================================================================
  SafeSendApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - Content-Type
          - x-api-key
        AllowMethods:
          - GET
          - POST
          - OPTIONS

  # =========================================================================
  # Lambda Functions
  # =========================================================================
  ScreenTransactionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: safesend-screen-transaction
      CodeUri: lambdas/screen_transaction/
      Handler: handler.handler
      ReservedConcurrentExecutions: 10
      Layers:
        - !Ref SharedLayer
      Policies:
        - KinesisCrudPolicy:
            StreamName: !Ref EventsStream
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
        - SSMParameterReadPolicy:
            ParameterName: "safesend/*"
      Events:
        ScreenTransaction:
          Type: HttpApi
          Properties:
            ApiId: !Ref SafeSendApi
            Path: /api/screen-transaction
            Method: POST



  AgentActionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: safesend-agent-action
      CodeUri: lambdas/agent_action/
      Handler: handler.handler
      Layers:
        - !Ref SharedLayer
      Policies:
        - KinesisCrudPolicy:
            StreamName: !Ref EventsStream
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt UserAlertsTopic.TopicName
        - SSMParameterReadPolicy:
            ParameterName: "safesend/*"
      Events:
        AgentAction:
          Type: HttpApi
          Properties:
            ApiId: !Ref SafeSendApi
            Path: /api/alerts/{txn_id}/action
            Method: POST

  GetAlertsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: safesend-get-alerts
      CodeUri: lambdas/get_alerts/
      Handler: handler.handler
      Layers:
        - !Ref SharedLayer
      Events:
        ListAlerts:
          Type: HttpApi
          Properties:
            ApiId: !Ref SafeSendApi
            Path: /api/alerts
            Method: GET
        GetAlert:
          Type: HttpApi
          Properties:
            ApiId: !Ref SafeSendApi
            Path: /api/alerts/{txn_id}
            Method: GET

  GetStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: safesend-get-stats
      CodeUri: lambdas/get_stats/
      Handler: handler.handler
      Layers:
        - !Ref SharedLayer
      Events:
        GetStats:
          Type: HttpApi
          Properties:
            ApiId: !Ref SafeSendApi
            Path: /api/stats
            Method: GET

  FraudQueryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: safesend-fraud-query
      CodeUri: lambdas/fraud_query/
      Handler: handler.handler
      Timeout: 15
      Layers:
        - !Ref SharedLayer
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
      Events:
        FraudQuery:
          Type: HttpApi
          Properties:
            ApiId: !Ref SafeSendApi
            Path: /api/fraud-query
            Method: POST

  GetNetworkGraphFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: safesend-get-network-graph
      CodeUri: lambdas/get_network_graph/
      Handler: handler.handler
      Layers:
        - !Ref SharedLayer
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: "safesend/*"
      Events:
        GetNetworkGraph:
          Type: HttpApi
          Properties:
            ApiId: !Ref SafeSendApi
            Path: /api/network-graph
            Method: GET


  # =========================================================================
  # Shared Lambda Layer
  # =========================================================================
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: safesend-shared
      ContentUri: layer/
      CompatibleRuntimes:
        - python3.12
    Metadata:
      BuildMethod: python3.12

  # =========================================================================
  # Kinesis Data Stream
  # =========================================================================
  EventsStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: safesend-events
      ShardCount: 1
      RetentionPeriodHours: 24
      StreamModeDetails:
        StreamMode: PROVISIONED

  # =========================================================================
  # SNS Topic
  # =========================================================================
  UserAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: safesend-user-alerts
      DisplayName: SafeSend

# =========================================================================
# Outputs
# =========================================================================
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${SafeSendApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"



  EventsStreamName:
    Description: Kinesis stream name
    Value: !Ref EventsStream

  SnsTopicArn:
    Description: SNS topic ARN for user alerts
    Value: !Ref UserAlertsTopic
